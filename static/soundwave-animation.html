<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundwave Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .soundwave-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a0b2e 0%, #2d1b4e 50%, #4a1942 100%);
            overflow: hidden;
        }

        /* Floating music notes */
        .music-note {
            position: absolute;
            color: rgba(168, 85, 247, 0.3);
            font-size: 24px;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            33% {
                transform: translate(50px, -100px) rotate(120deg);
            }
            66% {
                transform: translate(-50px, 100px) rotate(240deg);
            }
        }

        /* Animated waves SVG */
        .waves {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .wave-path {
            stroke-width: 2;
            fill: none;
        }

        /* Soundwave bars container */
        .soundwave-bars {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 200px;
            z-index: 10;
        }

        .bar {
            width: 8px;
            border-radius: 4px;
            background: linear-gradient(to top, #ec4899, #a855f7, #8b5cf6);
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% {
                height: var(--initial-height);
            }
            25% {
                height: calc(var(--initial-height) * 1.5);
            }
            50% {
                height: calc(var(--initial-height) * 0.8);
            }
            75% {
                height: calc(var(--initial-height) * 1.2);
            }
        }

        /* Glow effect */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(168,85,247,0.4) 0%, rgba(236,72,153,0.2) 50%, transparent 70%);
            filter: blur(80px);
            animation: glow-pulse 2s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes glow-pulse {
            0%, 100% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }
    </style>
</head>
<body>
    <div class="soundwave-container">
        <!-- Music notes -->
        <div id="music-notes"></div>

        <!-- Animated waves -->
        <svg class="waves" preserveAspectRatio="none" viewBox="0 0 1440 800">
            <defs>
                <linearGradient id="gradient-0" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#8b5cf6" />
                    <stop offset="50%" style="stop-color:#a855f7" />
                    <stop offset="100%" style="stop-color:#d946ef" />
                </linearGradient>
                <linearGradient id="gradient-1" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#8b5cf6" />
                    <stop offset="50%" style="stop-color:#a855f7" />
                    <stop offset="100%" style="stop-color:#d946ef" />
                </linearGradient>
                <linearGradient id="gradient-2" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#8b5cf6" />
                    <stop offset="50%" style="stop-color:#a855f7" />
                    <stop offset="100%" style="stop-color:#d946ef" />
                </linearGradient>
            </defs>
            <path id="wave-0" class="wave-path" stroke="url(#gradient-0)" opacity="0.6"></path>
            <path id="wave-1" class="wave-path" stroke="url(#gradient-1)" opacity="0.5"></path>
            <path id="wave-2" class="wave-path" stroke="url(#gradient-2)" opacity="0.4"></path>
        </svg>

        <!-- Glow effect -->
        <div class="glow"></div>

        <!-- Soundwave bars -->
        <div class="soundwave-bars" id="bars"></div>
    </div>

    <script>
        // Create music notes
        const notesContainer = document.getElementById('music-notes');
        const musicNoteSymbol = '♪';
        
        for (let i = 0; i < 8; i++) {
            const note = document.createElement('div');
            note.className = 'music-note';
            note.textContent = musicNoteSymbol;
            note.style.left = Math.random() * 100 + '%';
            note.style.top = Math.random() * 100 + '%';
            note.style.fontSize = (24 + Math.random() * 24) + 'px';
            note.style.animationDelay = (Math.random() * 5) + 's';
            note.style.animationDuration = (10 + Math.random() * 10) + 's';
            notesContainer.appendChild(note);
        }

        // Create soundwave bars
        const barsContainer = document.getElementById('bars');
        const barCount = 40;
        
        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            const initialHeight = Math.random() * 80 + 40;
            bar.style.setProperty('--initial-height', initialHeight + 'px');
            bar.style.animationDelay = (i * 0.05) + 's';
            barsContainer.appendChild(bar);
        }

        // Animate waves
        const waves = [
            { element: document.getElementById('wave-0'), baseY: 200, amplitude: 50, speed: 0.001 },
            { element: document.getElementById('wave-1'), baseY: 250, amplitude: 50, speed: 0.0012 },
            { element: document.getElementById('wave-2'), baseY: 300, amplitude: 50, speed: 0.0015 }
        ];

        let time = 0;

        function animateWaves() {
            time += 16; // Approximately 60fps

            waves.forEach((wave, index) => {
                const offset = Math.sin(time * wave.speed) * wave.amplitude;
                const d = `M0,${wave.baseY} Q360,${wave.baseY + offset} 720,${wave.baseY} T1440,${wave.baseY}`;
                wave.element.setAttribute('d', d);
            });

            requestAnimationFrame(animateWaves);
        }

        animateWaves();
    </script>
</body>
</html>
