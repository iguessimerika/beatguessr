<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatGuessr – Spiel</title>

    <style>
        body {
            background-image: url("../static/beatgussr-background.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.55);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(6px);
            width: 500px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
            font-size: 16px;
        }
        
        .input-wrapper {
            position: relative;
        }

        .btn {
            display: inline-block;
            padding: 12px;
            background: #ffffff;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            font-weight: 600;
            color: black;
            text-decoration: none;
            width: 250px;
            text-align: center;
            margin-top: 12px;
        }

        .btn:hover {
            background: #e6e6e6;
        }

        /* Dropdown */

        .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;

            background: white;
            border: 2px solid black;
            border-top: none;

            max-height: 150px;
            overflow-y: auto;

            z-index: 9999;
        }

        .dropdown div {
            padding: 8px;
            cursor: pointer;
            color: black;
            background: white;
        }

        .dropdown div:hover {
            background-color: #f0f0f0;
        }

        /* versteckt leere dropdowns */
        .dropdown:empty {
            display: none;
        }

        /* Eigener Player im Stil des Standardplayers */
        .audio-controls {
            margin-top: 20px;
            width: 100%;
            background: rgba(255,255,255,0.15);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .play-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: white;
            cursor: pointer;
            font-size: 18px;
        }

        .progress-container {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #4da3ff;
            border-radius: 4px;
        }

        .volume-icon {
            width: 28px;
            cursor: pointer;
            filter: brightness(0) invert(1);
        }

        .volume-slider {
            width: 90px;
            display: none;
            position: absolute;
            bottom: -35px;
        }

        .volume-container {
            position: relative;
        }

        .time-label {
            font-size: 14px;
            min-width: 80px;
        }

        .hint-box {
            background: rgba(255,255,255,0.15);
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .attemptMessage {
            margin-top: 15px;
            font-size: 18px;
            color: #ffcccc;
            display: none;
        }
    </style>
</head>

<body>

    <div class="game-container">

        <h1 style="font-size: 45px;">Song raten</h1>

        <h2 id="attemptMessage" style="font-size: 24px;"></h2>

        <div class="autocomplete-container">
        <!-- Artist -->
        <div class="input-wrapper">
            <input 
                id="artistInput" 
                name="artistInput" 
                type="text" 
                placeholder="Artist eingeben" 
                autocomplete="off"
            >
            <div id="artistDropdown" class="dropdown"></div>
        </div>

        <!-- Song -->
        <div class="input-wrapper">
            <input 
                id="songInput" 
                name="songInput" 
                type="text" 
                placeholder="Songtitel eingeben" 
                autocomplete="off"
                disabled
            >
            <div id="songDropdown" class="dropdown"></div>
        </div>
    </div>

        <!-- Audio ohne native Controls -->
        <audio id="player" name="player">
            <source id="audioSource" src="{{ song_url }}" type="audio/mpeg">
        </audio>

        <!-- Eigener Player -->
        <div class="audio-controls">
            <button id="playPauseBtn" class="play-btn">▶</button>

            <div class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>

            <div class="volume-container">
                <img src="../static/volume.png" id="volumeIcon" class="volume-icon">
                <input type="range" id="volumeSlider" min="0" max="100" value="50" class="volume-slider">
            </div>

            <span id="timeLabel" class="time-label">0:00 / 0:00</span>
        </div>

        <button class="btn" id="guessBtn">Guess abgeben</button>

        <div id="hint1" class="hint-box">Hinweis 1: {{ hint1 }}</div>
        <div id="hint2" class="hint-box">Hinweis 2: {{ hint2 }}</div>

        <div id="gameTimer" style="margin-top: 15px; font-size: 18px;"></div>

    </div>

    <script>
        const player = document.getElementById("player");
        const playPauseBtn = document.getElementById("playPauseBtn");
        const progressContainer = document.querySelector(".progress-container");
        const progressBar = document.getElementById("progressBar");
        const timeLabel = document.getElementById("timeLabel");
        const volumeIcon = document.getElementById("volumeIcon");
        const volumeSlider = document.getElementById("volumeSlider");
        const artistInput = document.getElementById("artistInput");
        const artistDropdown = document.getElementById("artistDropdown");
        const songInput = document.getElementById("songInput");
        const songDropdown = document.getElementById("songDropdown");
        const attemptMessage = document.getElementById("attemptMessage");
        const gameTimer = document.getElementById("gameTimer");
        
        let gameStartTime = null;
        let timerInterval = null;
        let lastArtistQuery = "";
        let lastSongQuery = "";

        /* Timerfunktion */
        gameTimer.textContent = "Spielzeit: 0:00";

        window.addEventListener("load", () => {
            gameStartTime = Date.now();

            timerInterval = setInterval(() => {
                const elapsedSec = Math.floor((Date.now() - gameStartTime) / 1000);
                gameTimer.textContent = `Spielzeit: ${formatTime(elapsedSec)}`;
            }, 1000);
        });

        /* Play/Pause */
        playPauseBtn.addEventListener("click", () => {
            if (player.paused) {
                player.play();
                playPauseBtn.textContent = "⏸";
            } else {
                player.pause();
                playPauseBtn.textContent = "▶";
            }
        });

        /* Zeitformat */
        function formatTime(sec) {
            if (isNaN(sec)) return "0:00";
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60).toString().padStart(2, "0");
            return `${m}:${s}`;
        }

        /* Fortschritt aktualisieren */
        player.addEventListener("timeupdate", () => {
            const percent = (player.currentTime / player.duration) * 100;
            progressBar.style.width = percent + "%";
            timeLabel.textContent = `${formatTime(player.currentTime)} / ${formatTime(player.duration)}`;
        });

        player.addEventListener("loadedmetadata", () => {
            timeLabel.textContent = `0:00 / ${formatTime(player.duration)}`;
        });

        /* Fortschrittsbalken klicken */
        progressContainer.addEventListener("click", (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            player.currentTime = percent * player.duration;
        });

        /* Lautstärke */
        volumeIcon.addEventListener("click", () => {
            volumeSlider.style.display =
                volumeSlider.style.display === "block" ? "none" : "block";
        });

        volumeSlider.addEventListener("input", () => {
            player.volume = volumeSlider.value / 100;
        });


        artistInput.oninput = async () => {
            const q = artistInput.value;
            lastArtistQuery = q;

            artistDropdown.innerHTML = "";

            if (!q) return;

            const res = await fetch(`/search_artists?q=${encodeURIComponent(q)}`);
            const data = await res.json();

            // ❗ Wenn sich der Input inzwischen geändert hat → abbrechen
            if (q !== lastArtistQuery) return;

            data.forEach(item => {
                const div = document.createElement("div");
                div.textContent = item.name;

                div.onclick = () => {
                    artistInput.value = item.name;
                    artistInput.dataset.id = item.artistid;
                    artistDropdown.innerHTML = "";
                };

                artistDropdown.appendChild(div);
            });

            songInput.disabled = !artistInput.value;
        };

        /* Dropdown-Funktionalität für Song anhand des Artists */
        songInput.oninput = async () => {
            const q = songInput.value;
            const artist = artistInput.value;

            lastSongQuery = q;

            songDropdown.innerHTML = "";

            if (!q || !artist) return;

            try {
                const res = await fetch(`/search_songs?q=${encodeURIComponent(q)}&artist=${encodeURIComponent(artist)}`);
                const data = await res.json();

                // ❗ Nur anzeigen, wenn es noch die aktuelle Anfrage ist
                if (q !== lastSongQuery) return;

                data.forEach(item => {
                    const div = document.createElement("div");
                    div.textContent = item.title;

                    div.onclick = () => {
                        songInput.value = item.title;
                        songInput.dataset.id = item.songid;
                        songDropdown.innerHTML = "";
                    };

                    songDropdown.appendChild(div);
                });

            } catch (err) {
                console.error("Fehler beim Laden der Songs:", err);
            }
        };

        artistInput.addEventListener("change", () => {
            songInput.value = "";
        });

        // Guess prüfen
        const artist_id =  "{{ artist }}";
        const song_id = "{{ song }}";
        const username = "{{ username }}"
        let attempts = 0;
        const maxAttempts = 4;

        document.getElementById("guessBtn").addEventListener("click", () => {
            const artistId = artistInput.dataset.id;   // gespeicherte ID
            const song = songInput.dataset.id;          // gespeicherte ID

            attempts++;
            
            // Prüfen
            if (parseInt(artistId) === parseInt(artist_id) && parseInt(song) === parseInt(song_id)) {
                // Stoppe den Timer
                clearInterval(timerInterval);

                // Gewinn
                window.location.href = `/win?username=${username}&artist_id=${artist_id}&song_id=${song_id}&time=${Math.floor((Date.now() - gameStartTime) / 1000)}`;
                return;
            }

            // Falsch geraten
            handleHints(attempts);

            if (attempts > maxAttempts) {
                window.location.href = `/loose?username=${username}&artist_id=${artist_id}&song_id=${song_id}&time=${Math.floor((Date.now() - gameStartTime) / 1000)}`;
            }
        });


        // Hinweise anzeigen
        function handleHints(attempts) {
            if (attempts > 0) {
                attemptMessage.style.display = "block";
                attemptMessage.textContent = `Leider falsch! Du hast noch ${maxAttempts - attempts + 1} Versuche übrig.`;
            }

            if (attempts === 3) {
                document.getElementById("hint1").style.display = "block";
            }

            if (attempts === 4) {
                document.getElementById("hint2").style.display = "block";
            }
        }
    </script>

</body>
</html>
