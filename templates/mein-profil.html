<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatGuessr – Mein Profil</title>

    <link rel="icon" type="image/png" href="../static/favicon.png">

    <style>
        body {
            background-image: url("../static/beatgussr-background.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;

            font-family: 'Segoe UI', sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .profile-container {
            background: rgba(0, 0, 0, 0.55);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(6px);
            width: 420px;
            text-align: center;
        }

        .title-pulse {
            animation: pulse 1.8s infinite ease-in-out;
        }

        @keyframes pulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        .section-title {
            font-size: 18px;
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            padding: 10px;
            background: #ffffff;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            color: black;
            text-decoration: none;
            width: 220px;
            text-align: center;
            margin-top: 10px;
        }

        .btn:hover {
            background: #e6e6e6;
        }

        .input-field {
            width: 90%;
            padding: 8px;
            border-radius: 8px;
            border: none;
            margin-top: 8px;
            font-size: 15px;
        }

        .small-btn {
            padding: 7px;
            font-size: 14px;
            width: 160px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 0;
        }

        h2 {
            font-size: 18px;
            margin-top: 2px;
            margin-bottom: 10px;
        }

        .msg {
            color: #ffffff;
            font-size: 16px;
            margin-top: 8px;
            min-height: 18px;
        }
    </style>
</head>

<body>

    <div class="profile-container">

        <h1 class="title-pulse">Mein Profil</h1>
        <h2>Hallo, {{username}}!</h2>

        <p class="section-title">Deine Daten</p>

        <form method="POST" action="/profil/update">

            <input type="hidden" name="userid" value="{{userid}}">
            <input type="hidden" name="action" value="change_data">
            <input class="input-field" type="text" name="username" value="{{username}}" placeholder="Benutzername">
            <input class="input-field" type="email" name="email" value="{{email}}" placeholder="E-Mail">

            <div id="msg" class="msg">{{ msg_update }}</div>
            <button class="btn small-btn" type="submit">Speichern</button>
        </form>

        <p class="section-title">Passwort ändern</p>

        <form method="POST" action="/profil/password">

            <input type="hidden" name="userid" value="{{userid}}">
            <input type="hidden" name="action" value="change_password">
            <input class="input-field" type="password" name="old_pw" placeholder="Aktuelles Passwort" required>
            <input class="input-field" type="password" id="new_pw" name="new_pw" placeholder="Neues Passwort" required>
            <input class="input-field" type="password" id="new_pw_confirm" name="new_pw_confirm" placeholder="Neues Passwort wiederholen" required>

            <div id="msg_password" class="msg">{{ msg_password }}</div>
            <button class="btn small-btn" type="submit">Passwort ändern</button>
        </form>

        <p class="section-title">Navigation</p>

        <a href="/dashboard" class="btn">⬅️ Dashboard</a>
        <a href="/logout" class="btn">🚪 Logout</a>

    </div>

    <script>
        const pw1 = document.getElementById("new_pw");
        const pw2 = document.getElementById("new_pw_confirm");
        const msg_password = document.getElementById("msg_password");

        pw2.addEventListener("input", () => {
            if (pw1.value !== pw2.value) {
                msg_password.style.color = '#ff6b6b';
                msg_password.textContent = "Passwörter stimmen nicht überein";
            } else {
                msg_password.textContent = "";
            }
        });
    </script>
</body>
</html>
