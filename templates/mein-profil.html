<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatGuessr – Mein Profil</title>

    <link rel="icon" type="image/png" href="../static/favicon.png">

    <style>
        body {
            background-image: url("../static/beatgussr-background.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;

            font-family: 'Segoe UI', sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .profile-container {
            background: rgba(0, 0, 0, 0.55);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(6px);
            width: 450px;
            text-align: center;
        }

        .title-pulse {
            animation: pulse 1.8s infinite ease-in-out;
        }

        @keyframes pulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .section-title {
            font-size: 22px;
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            padding: 12px;
            background: #ffffff;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            font-weight: 600;
            color: black;
            text-decoration: none;
            width: 250px;
            text-align: center;
            margin-top: 12px;
        }

        .btn:hover {
            background: #e6e6e6;
        }

        .input-field {
            width: 90%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
            font-size: 16px;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: white;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            font-weight: 700;
            margin: 0 auto 15px auto;
        }

        .small-btn {
            padding: 8px;
            font-size: 14px;
            width: 180px;
        }
    </style>
</head>

<body>

    <div class="profile-container">

        <h1 class="title-pulse" style="font-size: 42px;">Mein Profil</h1>
        <h2 style="margin-top: -10px; font-weight: 400;">Hallo, {{name}}!</h2>

        <div class="avatar">
            {{name[0]}}
        </div>

        <p class="section-title">Deine Daten</p>

        <form method="POST" action="/profil/update">

            <input class="input-field" type="text" name="username" value="{{username}}" placeholder="Benutzername">
            <input class="input-field" type="email" name="email" value="{{email}}" placeholder="E-Mail">

            <button class="btn small-btn" type="submit">Änderungen speichern</button>
        </form>

        <p class="section-title">Passwort ändern</p>

        <form method="POST" action="/profil/password">

            <input class="input-field" type="password" name="old_pw" placeholder="Aktuelles Passwort">
            <input class="input-field" type="password" name="new_pw" placeholder="Neues Passwort">

            <button class="btn small-btn" type="submit">Passwort aktualisieren</button>
        </form>

        <p class="section-title">Navigation</p>

        <a href="/dashboard" class="btn">⬅️ Zurück zum Dashboard</a>
        <a href="/logout" class="btn">🚪 Logout</a>

    </div>

</body>
</html>
