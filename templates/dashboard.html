<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatGuessr – Dashboard</title>

    <link rel="icon" type="image/png" href="../static/favicon.png">

    <style>
        body {
            background-image: url("../static/beatgussr-background.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;

            font-family: 'Segoe UI', sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .title-pulse {
            animation: pulse 1.8s infinite ease-in-out;
        }

        @keyframes pulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .dashboard-container {
            background: rgba(0, 0, 0, 0.55);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(6px);
            width: 450px;
            text-align: center;
        }

        .btn {
            display: inline-block;
            padding: 12px;
            background: #ffffff;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            font-weight: 600;
            color: black;
            text-decoration: none;
            width: 250px;
            text-align: center;
            margin-top: 12px;
        }

        .btn:hover {
            background: #e6e6e6;
        }

        .section-title {
            font-size: 22px;
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="dashboard-container">

        <h1 class="title-pulse" style="font-size: 50px;">Dashboard</h1>
        <h2 style="margin-top: -10px; font-weight: 400;">Willkommen, {{name}}</h2>

        <p class="section-title">Was möchtest du tun?</p>

        <a href="/spiel-starten" class="btn">🎵 Spiel starten</a>
        <a href="/profil" class="btn">👤 Mein Profil</a>
        <a href="/highscores" class="btn">🏆 Highscores</a>
        <a href="/logout" class="btn">🚪 Logout</a>

    </div>

</body>
</html>
