<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatGuessr – Login</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../static/favicon.png">

    <style>
        body {
            background-image: url("../static/beatgussr-background.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

            font-family: 'Segoe UI', sans-serif;
        }

        /* Pulse-Effekt für den Titel */
        .title-pulse {
            animation: pulse 1.8s infinite ease-in-out;
        }

        @keyframes pulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .login-container {
            background: rgba(0, 0, 0, 0.55);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(6px);
            width: 350px;
            text-align: center;
            color: white;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 16px;
            background: #fff;
        }

        input:focus {
            border-color: #888;
        }

        button {
            padding: 12px;
            background: #ffffff;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #e6e6e6;
        }

        .error {
            color: #ff6b6b;
            font-size: 14px;
            min-height: 18px;
        }

        .links {
            margin-top: 15px;
            font-size: 14px;
        }

        .links a {
            color: #ffffff;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-container">

        <!-- Titel mit Pulse-Effekt -->
        <h1 class="title-pulse">BeatGuessr</h1>

        <h2 style="margin-top: -10px; font-weight: 400;">Login</h2>

        <form id="loginForm" action="/login" method="post">
            <input id="email" name="email" type="email" placeholder="E-Mail-Adresse" required>
            <input id="password" name="password" type="password" placeholder="Passwort" required>

            <div id="error" class="error"></div>
            
            <button type="submit">Einloggen</button>
        </form>

        {% if error %}
            <p style="color:red;">{{ error }}</p>
        {% endif %}

        <div class="links">
            <a href="#" onclick="alert('Bitte wende dich an die Admins'); return false;">
                Passwort vergessen
            </a>
            <br>
            Noch kein Konto? 
            <a href="/registrierung">Jetzt registrieren</a>
        </div>

    </div>

</body>
</html>
