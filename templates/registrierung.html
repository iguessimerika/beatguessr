<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatGuessr – Registrierung</title>

    <!-- Favicon / Music-Icon -->
    <link rel="icon" type="image/png" href="../static/favicon.png">

    <style>
        body {
            background-image: url("../static/beatgussr-background.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

            font-family: 'Segoe UI', sans-serif;
        }

        /* Pulse-Effekt für den Titel */
        .title-pulse {
            animation: pulse 1.8s infinite ease-in-out;
        }

        @keyframes pulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .login-container {
            background: rgba(0, 0, 0, 0.55);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(6px);
            width: 350px;
            text-align: center;
            color: white;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 16px;
            background: #fff;
        }

        input:focus {
            border-color: #888;
        }

        .strength {
            height: 8px;
            border-radius: 5px;
            background: #333;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            background: #888;
            transition: 0.3s;
        }

        .error {
            color: #ff6b6b;
            font-size: 14px;
            min-height: 18px;
        }

        button {
            padding: 12px;
            background: #ffffff;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #e6e6e6;
        }

        .login-link {
            margin-top: 15px;
            font-size: 14px;
        }

        .login-link a {
            color: #ffffff;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-container">

        <!-- Titel mit Pulse-Effekt -->
        <h1 class="title-pulse">BeatGuessr</h1>

        <h2 style="margin-top: -10px; font-weight: 400;">Registrieren</h2>

        <form method="post" action="/registrierung">
            <input type="text" name="username" placeholder="Benutzername" required>

            <input type="email" name="email" placeholder="E-Mail-Adresse" required>

            <input id="pw1" type="password" name="password" placeholder="Passwort" required>

            <div class="strength">
                <div id="strength-bar" class="strength-bar"></div>
            </div>

            <input id="pw2" type="password" name="confirm_password" placeholder="Passwort bestätigen" required>

            <div id="error" class="error"></div>

            <button type="submit">Konto erstellen</button>

        </form>

        <div class="login-link">
            Schon ein Konto? <a href="/login">Hier einloggen</a>
        </div>

    </div>

    <script>
        const pw1 = document.getElementById("pw1");
        const pw2 = document.getElementById("pw2");
        const error = document.getElementById("error");
        const bar = document.getElementById("strength-bar");

        pw1.addEventListener("input", () => {
            const val = pw1.value;
            let strength = 0;

            if (val.length > 5) strength += 25;
            if (val.match(/[A-Z]/)) strength += 25;
            if (val.match(/[0-9]/)) strength += 25;
            if (val.match(/[^A-Za-z0-9]/)) strength += 25;

            bar.style.width = strength + "%";

            bar.style.background =
                strength < 50 ? "#ff6b6b" :
                strength < 75 ? "#ffd93d" :
                "#6cc070";
        });

        pw2.addEventListener("input", () => {
            if (pw1.value !== pw2.value) {
                error.textContent = "Passwörter stimmen nicht überein";
            } else {
                error.textContent = "";
            }
        });
    </script>

</body>
</html>
