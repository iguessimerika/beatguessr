<!doctype html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="../static/favicon.png">
    <meta charset="utf-8" />
    <title>BeatGuessr</title>
<style>
    body {
        background-image:
            url("../static/beatgussr-background.png");
        background-size: cover;
        background-repeat: no-repeat,no-repeat;
        background-position: center,center;
        background-attachment: fixed,fixed;
    }

    .sound-wave {
        position: absolute;
        top: 80%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 600px;
        height: auto;
        opacity: 0.8;
    }

    .btn {
        display: inline-block;
        padding: 12px;
        background: #ffffff;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 18px;
        cursor: pointer;
        font-weight: 600;
        color: black;
        text-decoration: none;
        width: 200px;
        text-align: center;
        margin-top: 10px;
    }

    .btn:hover {
        background: #e6e6e6;
    }

    .title-pulse {
        animation: pulse 1.8s infinite ease-in-out;
    }

    @keyframes pulse {
        0%   { transform: scale(1); }
        50%  { transform: scale(1.08); }
        100% { transform: scale(1); }
    }
</style>
</head>

<body class="body"> 
    <img class="sound-wave" src="{{ url_for('static', filename='sound-wave.gif') }}" alt="Sound Wave" />
    <center>
        <h1 class="title-pulse" style="color: white; font-size: 60px;">BeatGuessr {{name}}</h1>
        <p style="color: white; font-size: 24px;">Anmeldung:</p>

        <a href="/login" class="btn">Login</a>
        <a href="/registrierung" class="btn">Registrierung</a>
    </center>

    <ul>
        {% for item in tech_list %}
        <li>{{ item }}</li>
        {% endfor %}
    </ul>

</body>
</html>
