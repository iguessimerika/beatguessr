<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatGuessr – Start</title>

    <link rel="icon" type="image/png" href="../static/favicon.png">

    <style>
        body {
            background-image: url("../static/beatgussr-background.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;

            font-family: 'Segoe UI', sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .start-container {
            background: rgba(0, 0, 0, 0.55);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(6px);
            width: 450px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.45);
        }

        .title-pulse {
            animation: pulse 1.8s infinite ease-in-out;
        }

        @keyframes pulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .btn {
            display: inline-block;
            padding: 12px;
            background: #ffffff;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            font-weight: 600;
            color: black;
            text-decoration: none;
            width: 250px;
            text-align: center;
            margin-top: 12px;
        }

        .btn:hover {
            background: #e6e6e6;
        }

        .sound-wave {
            width: 260px;
            opacity: 0.85;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="start-container">

        <h1 class="title-pulse" style="font-size: 42px;">BeatGuessr</h1>
        <p style="margin-top: -10px; font-size: 20px; opacity: 0.85;">
            Willkommen! Bitte melde dich an.
        </p>

        <a href="/login" class="btn">Login</a>
        <a href="/registrierung" class="btn">Registrierung</a>

        <img class="sound-wave" src="{{ url_for('static', filename='sound-wave.gif') }}" alt="Sound Wave">

    </div>

</body>
</html>
